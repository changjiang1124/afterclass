{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card profile-card">
                <div class="card-header">
                    <h3>Profile</h3>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post" class="profile-form">
                        {% csrf_token %}
                        
                        <h4 class="section-title">Personal Information</h4>
                        
                        <div class="form-group mb-3">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" value="{{ user.username }}" readonly>
                            <small class="form-text text-muted">Username cannot be changed</small>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="first_name">First Name</label>
                                    <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="last_name">Last Name</label>
                                    <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="date_of_birth">Date of Birth <span class="text-muted">(optional)</span></label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ profile.date_of_birth|date:'Y-m-d' }}">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="chinese_name">Chinese Name <span class="text-muted">(if you have one)</span></label>
                                    <input type="text" class="form-control" id="chinese_name" name="chinese_name" value="{{ profile.chinese_name|default:'' }}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="preferred_name">Preferred Name / Nickname</label>
                                    <input type="text" class="form-control" id="preferred_name" name="preferred_name" value="{{ profile.preferred_name|default:'' }}">
                                </div>
                            </div>
                        </div>
                        
                        <!-- 学习信息部分已被移除，只能由教师在管理界面中设置 -->
                        
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}
