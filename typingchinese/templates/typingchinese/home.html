{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/typingchinese.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-3">
        <div class="col-md-12">
            <nav aria-label="breadcrumb" class="dashboard-nav">
                <ol class="breadcrumb bg-light py-2 px-3 rounded shadow-sm">
                    <li class="breadcrumb-item"><a href="{% url 'dashboard:dashboard' %}" class="dashboard-link"><i class="fas fa-home mr-1"></i> Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Chinese Typing Practice</li>
                </ol>
            </nav>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <div class="chinese-input-container shadow-sm rounded bg-white">
                <h2 class="text-center mb-4">Chinese Typing Practice</h2>
                <p class="text-center text-muted mb-4">Enter or generate Chinese text for typing practice</p>
                
                <div class="textarea-container">
                    <textarea id="chinese-text" class="form-control" rows="8" placeholder="Enter Chinese text here, or click the button below to generate random text..."></textarea>
                </div>
                
                <div class="buttons-container d-flex justify-content-between mt-3">
                    <div>
                        <button id="generate-btn" class="btn btn-primary generate-btn">
                            <i class="fas fa-robot mr-1"></i> AI Generate Text
                        </button>
                    </div>
                    <div id="start-practice-container" style="display: none;">
                        <button id="start-practice-btn" class="btn btn-success start-btn">Start Practice</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Generate Text Modal -->
<div class="modal fade" id="generateModal" tabindex="-1" role="dialog" aria-labelledby="generateModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header ai-modal-header">
                <h5 class="modal-title" id="generateModalLabel">
                    <i class="fas fa-magic mr-2"></i>AI Generate Chinese Text
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body ai-modal-body">
                <div class="form-group">
                    <label for="instruction-input" class="ai-instruction-label">
                        <i class="fas fa-lightbulb mr-1"></i> Generation Prompt
                        <small class="text-muted">(Please enter instructions for what content you want the AI to generate)</small>
                    </label>
                    <div class="input-wrapper">
                        <textarea class="form-control ai-instruction-input" id="instruction-input" rows="4" placeholder="For example: Generate an introduction about traditional Chinese festivals, or write a short article about environmental protection..."></textarea>
                    </div>
                    <div id="instruction-feedback" class="mt-2" style="display: none;"></div>
                </div>
                <div class="form-group ai-length-options">
                    <label class="ai-length-label"><i class="fas fa-text-height mr-1"></i> Text Length</label>
                    <div class="length-options-container">
                        <div class="form-check length-option">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthShort" value="short">
                            <label class="form-check-label" for="lengthShort">
                                Short <span class="text-muted">(approx. 50-100 characters)</span>
                            </label>
                        </div>
                        <div class="form-check length-option">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthMedium" value="medium" checked>
                            <label class="form-check-label" for="lengthMedium">
                                Medium <span class="text-muted">(approx. 100-200 characters)</span>
                            </label>
                        </div>
                        <div class="form-check length-option">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthLong" value="long">
                            <label class="form-check-label" for="lengthLong">
                                Long <span class="text-muted">(approx. 200-300 characters)</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer ai-modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary ai-generate-btn" id="confirm-generate-btn">
                    <i class="fas fa-wand-magic-sparkles mr-1"></i> Generate
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        let generatedTextId = null;
        
        // Check if textarea has content, decide whether to show "Start Practice" button
        function checkTextareaContent() {
            if ($("#chinese-text").val().trim().length > 0) {
                $("#start-practice-container").show();
            } else {
                $("#start-practice-container").hide();
            }
        }
        
        // Listen for text input changes
        $("#chinese-text").on('input', function() {
            checkTextareaContent();
        });
        
        // Open generate text modal
        $("#generate-btn").click(function() {
            // Clear feedback and instruction input
            $("#instruction-input").val('');
            $("#instruction-feedback").hide().html('');
            
            $("#generateModal").modal('show');
        });
        
        // Confirm generate text button
        $("#confirm-generate-btn").click(function() {
            const instruction = $("#instruction-input").val().trim();
            const length = $("input[name='textLength']:checked").val();
            
            // Validate instruction not empty
            if (!instruction) {
                $("#instruction-feedback")
                    .html('<div class="alert alert-warning">Please enter generation instructions</div>')
                    .show();
                return;
            }
            
            // Show loading state
            $(this).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...');
            $(this).prop('disabled', true);
            $("#instruction-feedback").hide().html('');
            
            // Send AJAX request to generate text
            fetch('{% url "typingchinese:generate_ai_text" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    instruction: instruction,
                    length: length
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    $("#chinese-text").val(data.text);
                    generatedTextId = data.id;
                    checkTextareaContent();
                    $("#generateModal").modal('hide');
                } else {
                    // Show error message
                    $("#instruction-feedback")
                        .html(`<div class="alert alert-danger">${data.error}</div>`)
                        .show();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                $("#instruction-feedback")
                    .html('<div class="alert alert-danger">An error occurred during generation, please try again</div>')
                    .show();
            })
            .finally(() => {
                $("#confirm-generate-btn").html('<i class="fas fa-wand-magic-sparkles mr-1"></i> Generate');
                $("#confirm-generate-btn").prop('disabled', false);
            });
        });
        
        // Start practice button
        $("#start-practice-btn").click(function() {
            const text = $("#chinese-text").val().trim();
            if (text.length > 0) {
                // Build URL with text content
                let url = '{% url "typingchinese:practice" %}?';
                
                if (generatedTextId) {
                    url += `text_id=${generatedTextId}`;
                } else {
                    url += `text=${encodeURIComponent(text)}`;
                }
                
                window.location.href = url;
            } else {
                alert('Please enter or generate text first');
            }
        });
        
        // Check textarea on page load
        checkTextareaContent();
    });
</script>
{% endblock %}
