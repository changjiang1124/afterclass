{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/typingchinese.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-12">
            <div class="chinese-input-container shadow-sm rounded bg-white">
                <h2 class="text-center mb-4">中文打字练习</h2>
                <p class="text-center text-muted mb-4">输入或生成中文文本进行打字练习</p>
                
                <div class="textarea-container">
                    <textarea id="chinese-text" class="form-control" rows="8" placeholder="在这里输入中文文本，或点击下方按钮生成随机文本..."></textarea>
                </div>
                
                <div class="buttons-container d-flex justify-content-between mt-3">
                    <div>
                        <button id="generate-btn" class="btn btn-primary generate-btn">
                            <i class="fas fa-robot mr-1"></i> AI 生成文本
                        </button>
                    </div>
                    <div id="start-practice-container" style="display: none;">
                        <button id="start-practice-btn" class="btn btn-success start-btn">开始练习</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 生成文本模态框 -->
<div class="modal fade" id="generateModal" tabindex="-1" role="dialog" aria-labelledby="generateModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="generateModalLabel">AI 生成中文文本</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="instruction-input">
                            <i class="fas fa-lightbulb mr-1"></i> 生成指令
                            <small class="text-muted">(请输入指令，告诉AI你想要生成什么内容)</small>
                        </label>
                        <textarea class="form-control" id="instruction-input" rows="4" placeholder="例如：生成一段关于中国传统节日的介绍，或者写一篇关于环保的短文..."></textarea>
                        <div id="instruction-feedback" class="mt-2" style="display: none;"></div>
                    </div>
                    <div class="form-group">
                        <label>文本长度</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthShort" value="short">
                            <label class="form-check-label" for="lengthShort">
                                短 (约50-100字)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthMedium" value="medium" checked>
                            <label class="form-check-label" for="lengthMedium">
                                中 (约100-200字)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="textLength" id="lengthLong" value="long">
                            <label class="form-check-label" for="lengthLong">
                                长 (约200-300字)
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirm-generate-btn">生成</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        let generatedTextId = null;
        
        // 检查文本区域是否有内容，决定是否显示"开始练习"按钮
        function checkTextareaContent() {
            if ($("#chinese-text").val().trim().length > 0) {
                $("#start-practice-container").show();
            } else {
                $("#start-practice-container").hide();
            }
        }
        
        // 监听文本输入变化
        $("#chinese-text").on('input', function() {
            checkTextareaContent();
        });
        
        // 打开生成文本模态框
        $("#generate-btn").click(function() {
            // 清空反馈信息和指令输入
            $("#instruction-input").val('');
            $("#instruction-feedback").hide().html('');
            
            $("#generateModal").modal('show');
        });
        
        // 确认生成文本按钮
        $("#confirm-generate-btn").click(function() {
            const instruction = $("#instruction-input").val().trim();
            const length = $("input[name='textLength']:checked").val();
            
            // 验证指令不为空
            if (!instruction) {
                $("#instruction-feedback")
                    .html('<div class="alert alert-warning">请输入生成指令</div>')
                    .show();
                return;
            }
            
            // 显示加载状态
            $(this).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 生成中...');
            $(this).prop('disabled', true);
            $("#instruction-feedback").hide().html('');
            
            // 发送AJAX请求生成文本
            fetch('{% url "typingchinese:generate_ai_text" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    instruction: instruction,
                    length: length
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    $("#chinese-text").val(data.text);
                    generatedTextId = data.id;
                    checkTextareaContent();
                    $("#generateModal").modal('hide');
                } else {
                    // 显示错误信息
                    $("#instruction-feedback")
                        .html(`<div class="alert alert-danger">${data.error}</div>`)
                        .show();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                $("#instruction-feedback")
                    .html('<div class="alert alert-danger">生成过程中发生错误，请重试</div>')
                    .show();
            })
            .finally(() => {
                $("#confirm-generate-btn").html('生成');
                $("#confirm-generate-btn").prop('disabled', false);
            });
        });
        
        // 开始练习按钮
        $("#start-practice-btn").click(function() {
            const text = $("#chinese-text").val().trim();
            if (text.length > 0) {
                // 构建URL，包含文本内容
                let url = '{% url "typingchinese:practice" %}?';
                
                if (generatedTextId) {
                    url += `text_id=${generatedTextId}`;
                } else {
                    url += `text=${encodeURIComponent(text)}`;
                }
                
                window.location.href = url;
            } else {
                alert('请先输入或生成文本');
            }
        });
        
        // 页面加载时检查文本区域
        checkTextareaContent();
    });
</script>
{% endblock %}
