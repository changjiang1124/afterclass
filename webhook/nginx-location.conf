# Paste this inside the existing `server { ... listen 443 ssl; ... }` block
# in /etc/nginx/sites-available/afterclass, e.g. just before `location / { ... }`.
#
# Then: sudo nginx -t && sudo systemctl reload nginx

location = /gh-webhook/ {
    # GitHub webhooks send JSON payloads, sometimes a few hundred KB
    client_max_body_size 2m;

    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Deploy can take a while (collectstatic + migrate). The listener returns
    # 202 immediately and deploys in the background, but raise timeouts anyway.
    proxy_read_timeout 30s;
}
