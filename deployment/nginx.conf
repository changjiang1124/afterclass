# Nginx配置文件 - Tongcove (Learn Chinese Perth)
# 生产环境配置，包含SSL、安全头部和性能优化

# HTTP重定向到HTTPS (HTTP redirect to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name afterclass.learnchineseperth.com.au www.afterclass.learnchineseperth.com.au;
    
    # 重定向所有HTTP请求到HTTPS (Redirect all HTTP requests to HTTPS)
    return 301 https://$server_name$request_uri;
}

# 主HTTPS服务器配置 (Main HTTPS server configuration)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name afterclass.learnchineseperth.com.au www.afterclass.learnchineseperth.com.au;

    # SSL配置 (SSL Configuration)
    ssl_certificate /etc/letsencrypt/live/afterclass.learnchineseperth.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/afterclass.learnchineseperth.com.au/privkey.pem;
    
    # SSL安全配置 (SSL Security Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP装订 (OCSP Stapling)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/afterclass.learnchineseperth.com.au/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 安全头部 (Security Headers)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; media-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 基本配置 (Basic Configuration)
    root /var/www/afterclass;
    index index.html;
    
    # 字符集 (Character set)
    charset utf-8;
    
    # 客户端最大请求体大小 (Client max body size)
    client_max_body_size 10M;
    
    # 缓冲区设置 (Buffer settings)
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # 超时设置 (Timeout settings)
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Gzip压缩 (Gzip compression)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 静态文件处理 (Static files handling)
    location /static/ {
        alias /var/www/afterclass/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # 压缩静态文件 (Compress static files)
        gzip_static on;
        
        # 安全设置 (Security settings)
        location ~* \.(js|css)$ {
            add_header Content-Type text/plain;
        }
    }

    # 媒体文件处理 (Media files handling)
    location /media/ {
        alias /var/www/afterclass/media/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
        
        # 限制可执行文件 (Restrict executable files)
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # 健康检查端点 (Health check endpoint)
    location /health/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API端点速率限制 (API endpoint rate limiting)
    location /speak_practice/api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # API特定的安全头部 (API-specific security headers)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
    }

    # 主应用程序代理 (Main application proxy)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # 代理超时设置 (Proxy timeout settings)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 代理缓冲设置 (Proxy buffer settings)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 阻止访问敏感文件 (Block access to sensitive files)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(env|log|ini|conf|bak|old|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 阻止常见攻击 (Block common attacks)
    location ~* (eval\(|base64_decode|gzinflate|rot13|str_rot13) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志配置 (Logging configuration)
    access_log /var/log/nginx/afterclass_access.log combined;
    error_log /var/log/nginx/afterclass_error.log warn;
}

# 速率限制配置 (Rate limiting configuration)
# 这应该放在http块中，通常在/etc/nginx/nginx.conf
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
# limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;